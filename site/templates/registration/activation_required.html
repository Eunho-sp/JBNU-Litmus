{% extends "base.html" %}

{% block media %}
<style>
    .title-div {
        display: none;
    }
    #page-container {
        background: var(--page-bg) !important;
    }
    footer {
        background: var(--page-bg) !important;
    }
    .message-container {
        max-width: 500px;
        margin: 120px auto;
        padding: 40px 30px;
        background-color: var(--page-bg);
        border: 1px solid var(--border-secondary);
        border-radius: 10px;
        text-align: center;
    }
    .message-title {
        font-size: 22px;
        font-weight: 600;
        color: var(--font-basic-black);
        margin-bottom: 12px;
    }
    .message-text {
        font-size: 15px;
        color: var(--font-grey);
        line-height: 1.6;
    }
    .message-links {
        margin-top: 24px;
        display: flex;
        justify-content: center;
        gap: 16px;
        font-size: 14px;
    }
    .message-links a {
        color: var(--primary-color);
        text-decoration: none;
        padding: 8px 16px;
        border: 1px solid var(--border-secondary);
        border-radius: 8px;
    }
    .message-links a:hover {
        background-color: var(--light-bg);
    }
</style>

{% endblock %}
{% block body %}
    <div class="message-container">
        <p class="message-title">{{ _('이메일 인증이 필요합니다') }}</p>
        <p class="message-text">
            {{ _('이메일 인증이 완료되지 않은 계정입니다.') }}<br>
            {{ _('이메일을 확인하여 계정을 활성화해주세요.') }}<br><br>
            {{ _('메일이 도착하지 않은 경우, 아래 버튼을 이용해주세요.') }}
        </p>
        <div class="message-links">
            <a href="{{ url('resend_activation_email') }}">{{ _('활성화 메일 재전송') }}</a>
            <a href="{{ url('email_change') }}">{{ _('이메일 변경') }}</a>
        </div>
    </div>
{% endblock %}
